version: 2

sources:
  - name: billing
    database: raw_db
    schema: billing
    tables:
      - name: accounts
        description: Raw account records from the billing system
        columns:
          - name: account_id
          - name: account_name
          - name: billing_email
          - name: country_code
          - name: metadata
          - name: plan_tier
          - name: created_at
          - name: updated_at

      - name: subscriptions
        description: Raw subscription records
        columns:
          - name: subscription_id
          - name: account_id
          - name: plan_tier
          - name: monthly_price_cents
          - name: seat_count
          - name: start_date
          - name: end_date
          - name: status
          - name: cancellation_reason
          - name: created_at

      - name: invoices
        description: Raw invoice records
        columns:
          - name: invoice_id
          - name: account_id
          - name: subscription_id
          - name: amount_due_cents
          - name: invoice_date
          - name: due_date
          - name: paid_at
          - name: status
