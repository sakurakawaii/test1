[pytest]
testpaths = tests
addopts = --strict-markers
markers =
    static: test exercises a static/class-level method (no instance state required)
    reject_verification: verifies a defect reported in REPORT.md actually occurs (not expected behavior)
    suggested_feature: test for a suggested (not yet implemented) feature; expected to fail
    feature_construction: constructing components from raw values
    feature_normalization: clamping / normalizing of raw inputs
    feature_equality: value-based equality and hashing
    feature_arithmetic: component shift arithmetic (+ / -)
    feature_argparse: argparse `argtype` integration helpers
    feature_naming: string-name handling of named components
    feature_aliases: alternative-name (alias) resolution
    feature_year_tracking: optional year attachment on Month/Season
    feature_calendar_math: calendar computations (monthrange, lengths, nth weekday)
    feature_clock_format: 12h/24h clock conversions
    feature_datetime_parity: consistency with the stdlib datetime module
    feature_exports: package-level re-exports
    feature_duration_construction: building Duration objects
    feature_duration_simplify: Duration unit simplification
    feature_duration_total: Duration totals and exactness guards
    feature_duration_operators: Duration operator overloads
    feature_duration_compare: Duration comparison and truthiness
