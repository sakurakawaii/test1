# warehouse_settings.ini
#
# MIGRATION NOTE (classification = CONFIGURATION FILE):
# Format kept as INI. inventory_core.load_config() reads it with the stdlib
# parser (ConfigParser -> configparser in Python 3), which consumes this INI
# unchanged, so no code-side reader changes are required. TOML was NOT chosen
# because tomllib is only in the stdlib from Python 3.11 (target is 3.10) and
# adopting it would require rewriting load_config(). Values are unchanged.
#
# configparser accepts full-line comments beginning with '#' or ';'.

[routing]
partition_count = 8
# NOTE: warehouse_config.PARTITION_COUNT is 6, but the pipeline entry point
# reads THIS value (8) via config.getint('routing','partition_count'). The two
# are not reconciled in code; the .py constant appears unused by inventory_core.
hash_seed_pinned = false
# REVIEW [HIGH]: stock_router.route_to_partition() uses hash(str(sku)), which
# is randomized per-process in Python 3. If stable routing is required, either
# set this to true AND export PYTHONHASHSEED=0 in the runner, or switch to a
# content hash (see stock_router.py). This flag is currently read by no code.

[auth]
operator_id = wh-ops-01
# REVIEW: deploy-time secret placeholder - must be replaced at deploy.
signing_key = REPLACE_ME_AT_DEPLOY
session_ttl_seconds = 3600

[thresholds]
stockout_warning = 1
stockout_critical = 2
fill_rate_floor = 0.95
turnover_floor = 0.80

[database]
host = inventory-db.internal
port = 3306
# REVIEW [HIGH]: 'MySQLdb' is the Python 2 driver (MySQL-python), which has no
# Python 3 release. Use mysqlclient (imports as 'MySQLdb', near drop-in) or
# PyMySQL. No code in this submission reads [database] or opens a DB
# connection, so this is config-only - confirm with the team which driver the
# (unsubmitted) DB layer uses and update accordingly. See Dependency Updates.
driver = MySQLdb
