[pytest]
pythonpath = .
testpaths = tests
addopts = -ra --strict-markers
markers =
    construction: feature tests for creating component/duration instances
    normalization: feature tests for value clamping, name resolution and classmethod normalizers
    identity: feature tests for equality, hashing and int/str conversion protocols
    arithmetic: feature tests for +, -, *, / and negation operators
    calendar: feature tests for year-aware calendar behavior (Month/Season)
    conversion: feature tests for representation conversions (Hour 12h/24h, Duration/timedelta)
    comparison: feature tests for ordering operators
    simplification: feature tests for Duration.simplify and related invariants
    argparse_support: feature tests for the argtype argparse helpers
    static: test exercises a static/class-level method (no instance required)
    reject_verification: temporary test verifying a reported defect is present (not expected behavior)
    suggested_feature: test for a suggested, not-yet-implemented feature (expected to fail)
