# warehouse_settings.ini
# PY3-MIGRATED: Format retained as INI. Python 3 configparser reads this file
# unchanged; no structural conversion is required. Notes below document the
# migration review points. (configparser comment lines must start with # or ;;
# inline end-of-line comments are NOT enabled by default, so all notes are on
# their own lines and no value contains a literal '%' that BasicInterpolation
# would try to expand.)

[routing]
partition_count = 8
# PY3-REVIEW: hash_seed_pinned is now effectively MANDATORY if stock_router ever
# reverts to the builtin hash(). The migrated stock_router.py uses a content hash
# (hashlib) that is deterministic regardless of this flag; keep it as-is unless
# the team re-pins PYTHONHASHSEED instead. See report MR for stock_router.
hash_seed_pinned = false

[auth]
operator_id = wh-ops-01
signing_key = REPLACE_ME_AT_DEPLOY
# PY3-REVIEW: generate_session_token() utf-8-encodes this key before hashing.
# For ASCII keys the token is identical to Python 2; a non-ASCII key would differ.
session_ttl_seconds = 3600

[thresholds]
stockout_warning = 1
stockout_critical = 2
fill_rate_floor = 0.95
turnover_floor = 0.80

[database]
host = inventory-db.internal
port = 3306
# PY3-REVIEW: driver value intentionally left as MySQLdb. The recommended Python
# 3 replacement, mysqlclient, still exposes the `MySQLdb` import name, so this
# value stays valid. No code in this submission reads the [database] section, so
# this is only consumed by the (not submitted) DB-access module; reconcile there.
# If the team chooses PyMySQL instead, change this to `pymysql`. See report
# Dependency Updates and Cross-Module Interface Warnings.
driver = MySQLdb
